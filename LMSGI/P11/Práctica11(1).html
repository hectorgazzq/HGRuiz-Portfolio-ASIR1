<!DOCTYPE html>
<html>
  <head>
    <title>Ejercicio 11(1)</title>
    <meta charset="utf-8" />
    <style type="text/css">
      h1 {
        margin: 0.5in;
        border: 2px solid red;
      } /* inches (pulgadas) */
      h2 {
        line-height: 3cm;
        border: 10px solid blue;
      } /* centímetros */
      h3 {
        word-spacing: 4mm;
      } /* milímetros */
      p {
        font-size: 12pt;
      } /* puntos */
      strong {
        font-size: 2pc;
      } /* picas */
    </style>
  </head>
  <body>
    <h1>a) Unidades absolutas</h1>
    <h2>inn, cm, mm, px, pc, pt<br />inn, cm, mm, px, pc, pt</h2>
    <h3>Las unidades absolutas establecen ...</h3>
    <p>... de forma completa el valor ...</p>
    <strong>...de una medida. </strong>
  </body>
</html>
