<!doctype html>
<html> 
<head> 
<title>Práctica 2</title> 
<meta charset="utf-8">
<style type="text/css">
/*Estilos para la tabla.
Afectará a toda la tabla*/

table{
    width: 500px; /*anchura de la tabla*/
    height: 500px; /*altura de la tabla*/
    border-color: #f00;
    border-width: 10px;
    border-style: dashed;
    background-color: yellow;
    color: #f00;
    text-align: center;
    empty-cells: hide; /*oculta la celda vacia de la tabla*/

    /*para la última propiedad existen dos valores: show y hide
    se puede aprobar en chrome o en Firefox para ver como quedan esos dos valores*/

}

td{
    border-width: 20px; 
    border-style: dotted; 
    border-color: cyan;
}


</style>

</head> 

<body> 
    <table>
    <tr>
        <td>ASIR1</td>
        <td>ASIR2</td>
    </tr>
    <tr>
        <td></td>
        <td>SMR2</td>
    </tr>
    <tr>
        <td></td>
        <td></td>
    </tr>
    </table>
</body> 
</html>
