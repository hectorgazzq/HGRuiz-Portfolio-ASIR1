<!doctype html>
<html>
<head>
<title>Práctica 9(1): Ejemplo de estilos CSS para varios medios</title>
<meta charset="utf-8">
<style type="text/css">

    @media screen {

        body {
            background-color: #ffc;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: 12px;
            color: #00f;
        }
        p {
            text-decoration: underline;
        }
    }

    @media print {
        body {
            font-family: 'Comic Sans Ms';
            font-size: 200px;
            color: #f00;
            background-color: blue;
        }
    }

    @media handheld {
        body {
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            color: #000;
        }

    }

</style>
</head> 
<body>

<p>Integración de hojas de estilo en el documento</p> 

<p>Los estilos CSS</p> 

</body>
</html>
